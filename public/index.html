<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>水果游戏</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overscroll-behavior-x: none;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #fff;
      padding: 24px 24px 60px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    h1 {
      font-size: clamp(28px, 7vw, 40px);
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(255, 140, 0, 0.4);
    }
    .subtitle {
      font-size: 14px;
      opacity: 0.6;
      margin-bottom: 32px;
    }
    .games {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 320px;
    }
    .game-card {
      display: block;
      text-decoration: none;
      color: #fff;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      transition: transform 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .game-card:active {
      transform: scale(0.97);
      background: rgba(255, 255, 255, 0.1);
    }
    .game-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }
    .game-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .game-desc {
      font-size: 13px;
      opacity: 0.6;
    }
    .card-slash { border-color: rgba(231, 76, 60, 0.3); }
    .card-slash:active { background: rgba(231, 76, 60, 0.15); }
    .card-match { border-color: rgba(155, 89, 182, 0.3); }
    .card-match:active { background: rgba(155, 89, 182, 0.15); }
    .card-tetris { border-color: rgba(0, 200, 255, 0.3); }
    .card-tetris:active { background: rgba(0, 200, 255, 0.15); }
  </style>
</head>
<body>
  <h1>🎮 水果游戏中心</h1>
  <p class="subtitle">选择一个游戏开始挑战</p>
  <div class="games">
    <a href="/fruit-slash.html" class="game-card card-slash">
      <div class="game-icon">🍉</div>
      <div class="game-title">切水果大作战</div>
      <div class="game-desc">滑动手指切开水果，60秒限时挑战</div>
    </a>
    <a href="/match3.html" class="game-card card-match">
      <div class="game-icon">🍇</div>
      <div class="game-title">水果消消乐</div>
      <div class="game-desc">交换相邻水果，三连消除得分</div>
    </a>
    <a href="/tetris.html" class="game-card card-tetris">
      <div class="game-icon">🧱</div>
      <div class="game-title">俄罗斯方块</div>
      <div class="game-desc">经典方块消除，看你能撑多久</div>
    </a>
  </div>
  <script>
    // Prevent swipe-back in WeChat etc.
    window.history.pushState(null,'',location.href);
    window.history.pushState(null,'',location.href);
    window.addEventListener('popstate',function(){window.history.pushState(null,'',location.href);});
  </script>
</body>
</html>
