<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>小游戏中心</title>
  <meta property="og:title" content="小游戏中心">
  <meta property="og:description" content="切水果、消消乐、俄罗斯方块、2048、Flappy Bird、贪吃蛇">
  <meta name="description" content="在线小游戏合集，切水果、消消乐、俄罗斯方块、2048、Flappy Bird、贪吃蛇">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overscroll-behavior-x: none;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      padding: 16px 16px 40px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    h1 {
      font-size: 22px;
      margin: 8px 0 4px;
      text-shadow: 0 0 20px rgba(255, 140, 0, 0.4);
    }
    .subtitle {
      font-size: 13px;
      opacity: 0.6;
      margin-bottom: 14px;
    }
    .games {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 400px;
    }
    .game-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #fff;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 14px 8px;
      text-align: center;
      transition: transform 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .game-card:active {
      transform: scale(0.96);
      background: rgba(255, 255, 255, 0.1);
    }
    .game-icon {
      font-size: 32px;
      margin-bottom: 6px;
    }
    .game-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 3px;
    }
    .game-desc {
      font-size: 11px;
      opacity: 0.5;
      line-height: 1.3;
    }
    .card-slash { border-color: rgba(231, 76, 60, 0.3); }
    .card-slash:active { background: rgba(231, 76, 60, 0.15); }
    .card-match { border-color: rgba(155, 89, 182, 0.3); }
    .card-match:active { background: rgba(155, 89, 182, 0.15); }
    .card-tetris { border-color: rgba(0, 200, 255, 0.3); }
    .card-tetris:active { background: rgba(0, 200, 255, 0.15); }
    .card-2048 { border-color: rgba(246, 94, 59, 0.3); }
    .card-2048:active { background: rgba(246, 94, 59, 0.15); }
    .card-flappy { border-color: rgba(78, 192, 202, 0.3); }
    .card-flappy:active { background: rgba(78, 192, 202, 0.15); }
    .card-snake { border-color: rgba(0, 255, 100, 0.3); }
    .card-snake:active { background: rgba(0, 255, 100, 0.15); }
  </style>
</head>
<body>
  <h1>🎮 小游戏中心</h1>
  <p class="subtitle">选择一个游戏开始挑战</p>
  <div class="games">
    <a href="/fruit-slash.html" class="game-card card-slash">
      <div class="game-icon">🍉</div>
      <div class="game-title">切水果大作战</div>
      <div class="game-desc">滑动手指切开水果，60秒限时挑战</div>
    </a>
    <a href="/match3.html" class="game-card card-match">
      <div class="game-icon">🍇</div>
      <div class="game-title">水果消消乐</div>
      <div class="game-desc">交换相邻水果，三连消除得分</div>
    </a>
    <a href="/tetris.html" class="game-card card-tetris">
      <div class="game-icon">🧱</div>
      <div class="game-title">俄罗斯方块</div>
      <div class="game-desc">经典方块消除，看你能撑多久</div>
    </a>
    <a href="/2048.html" class="game-card card-2048">
      <div class="game-icon">🔢</div>
      <div class="game-title">2048</div>
      <div class="game-desc">滑动合并数字，挑战最高分</div>
    </a>
    <a href="/flappy.html" class="game-card card-flappy">
      <div class="game-icon">🐦</div>
      <div class="game-title">Flappy Bird</div>
      <div class="game-desc">点击飞翔，穿越管道</div>
    </a>
    <a href="/snake.html" class="game-card card-snake">
      <div class="game-icon">🐍</div>
      <div class="game-title">贪吃蛇</div>
      <div class="game-desc">控制蛇吃食物，越吃越长</div>
    </a>
  </div>
  <script>
    // Prevent swipe-back in WeChat etc.
    window.history.pushState(null,'',location.href);
    window.history.pushState(null,'',location.href);
    window.addEventListener('popstate',function(){window.history.pushState(null,'',location.href);});
  </script>
</body>
</html>
