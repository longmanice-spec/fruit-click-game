<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>水果消消乐</title>
  <link rel="stylesheet" href="/css/match3.css?v=4">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍇</text></svg>">
</head>
<body>
  <a href="/" class="back-link">← 返回</a>

  <div id="hud" class="hidden">
    <div class="hud-item">
      <div class="hud-value" id="hud-score">0</div>
      <div class="hud-label">分数</div>
    </div>
    <div class="hud-item hud-timer">
      <div class="hud-value" id="hud-timer">60</div>
      <div class="hud-label">秒</div>
    </div>
  </div>

  <div id="board" class="hidden"></div>

  <div id="screen-start" class="screen">
    <h1>🍇 水果消消乐</h1>
    <p class="desc">交换相邻水果，三连消除得分</p>
    <p class="tip">连锁消除分数翻倍！限时60秒</p>
    <input type="text" id="input-name" placeholder="输入你的昵称" maxlength="12" autocomplete="off">
    <button id="btn-start" class="btn btn-primary">开始游戏</button>
    <button id="btn-rank" class="btn btn-ghost">🏆 排行榜</button>
  </div>

  <div id="screen-over" class="screen hidden">
    <h1>⏰ 时间到！</h1>
    <div class="card">
      <div class="card-score" id="over-score">0</div>
      <div class="card-label">最终得分</div>
    </div>
    <div class="status" id="over-status"></div>
    <button id="btn-restart" class="btn btn-primary">再来一局</button>
    <button id="btn-rank2" class="btn btn-ghost">🏆 排行榜</button>
  </div>

  <div id="screen-rank" class="screen hidden">
    <h1>🏆 排行榜</h1>
    <div id="rank-list" class="rank-list">
      <p class="muted">加载中...</p>
    </div>
    <button id="btn-back" class="btn btn-ghost">← 返回</button>
  </div>

  <script src="/js/match3.js?v=4"></script>
</body>
</html>
